name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Validate tax_rates.yaml
        run: |
          python -c "
          import yaml
          with open('src/tax_engine/data/tax_rates.yaml') as f:
              data = yaml.safe_load(f)
          assert 'income_tax' in data
          assert 'simplified_tax' in data
          assert 'exempt_75' in data
          print('tax_rates.yaml — OK')
          "

      - name: Validate kvad_mapping.json
        run: |
          python -c "
          import json
          with open('src/tax_engine/data/kvad_mapping.json') as f:
              data = json.load(f)
          assert 'codes' in data
          assert len(data['codes']) > 0
          print(f'kvad_mapping.json — OK: {len(data[\"codes\"])} codes')
          "

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v
        env:
          PYTHONPATH: .
